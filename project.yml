name: InvoiceQRScanner
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  CodeScanner:
    url: https://github.com/twostraws/CodeScanner
    from: 2.5.2

targets:
  InvoiceQRScanner:
    type: application
    platform: iOS
    sources:
      - path: InvoiceQRScanner
    info:
      path: InvoiceQRScanner/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.InvoiceQRScanner
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: CodeScanner

